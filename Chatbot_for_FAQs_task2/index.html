<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AskBot — FAQ Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>

<style>
/* ── Reset ─────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0e0e11;
  --ink2:#1c1c22;
  --ink3:#272731;
  --border:#2e2e3a;
  --border2:#3d3d50;
  --gold:#f0c040;
  --gold-dim:rgba(240,192,64,.15);
  --gold-glow:rgba(240,192,64,.35);
  --teal:#38c9b0;
  --teal-dim:rgba(56,201,176,.12);
  --cream:#f5f0e8;
  --cream2:#e8e0cc;
  --muted:#6b6b82;
  --muted2:#4a4a5e;
  --user-bg:#f0c040;
  --user-text:#0e0e11;
  --bot-bg:#1c1c22;
  --r:12px;
  --rsm:7px;
}

html,body{height:100%;overflow:hidden}
body{
  font-family:'IBM Plex Sans',sans-serif;
  background:var(--ink);
  color:var(--cream);
  display:flex;flex-direction:column;
}

/* ── Scrollbar ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── Header ─────────────────────────────────────────────────────────────── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:58px;flex-shrink:0;
  background:var(--ink2);
  border-bottom:1px solid var(--border);
}
.hdr-left{display:flex;align-items:center;gap:14px}
.logo-icon{
  width:34px;height:34px;border-radius:8px;
  background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0;
}
.logo-text{
  font-family:'Playfair Display',serif;
  font-size:1.25rem;font-weight:700;
  color:var(--cream);letter-spacing:-0.01em;
}
.logo-tag{
  font-family:'IBM Plex Mono',monospace;
  font-size:.62rem;color:var(--muted);
  letter-spacing:.1em;text-transform:uppercase;
  margin-top:1px;
}
.hdr-right{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--muted)}
.pulse{
  width:7px;height:7px;background:#4ade80;border-radius:50%;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(74,222,128,.4)}50%{opacity:.6;box-shadow:0 0 0 4px rgba(74,222,128,0)}}

/* ── Body Layout ─────────────────────────────────────────────────────────── */
.layout{
  flex:1;display:grid;
  grid-template-columns:252px 1fr;
  overflow:hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
.sidebar{
  background:var(--ink2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;padding:20px 16px;gap:22px;
}
.sb-section-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:.62rem;font-weight:500;
  color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:8px;
}

/* category pills */
.cat-list{list-style:none;display:flex;flex-direction:column;gap:3px}
.cat-btn{
  width:100%;text-align:left;
  background:transparent;border:1px solid transparent;
  border-radius:var(--rsm);
  padding:7px 11px;
  font-family:'IBM Plex Sans',sans-serif;font-size:.83rem;font-weight:500;
  color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  transition:background .15s,color .15s,border-color .15s;
}
.cat-btn:hover,.cat-btn.active{
  background:var(--gold-dim);color:var(--gold);border-color:rgba(240,192,64,.25);
}
.cat-count{
  font-family:'IBM Plex Mono',monospace;font-size:.62rem;
  background:var(--ink3);border-radius:20px;padding:1px 7px;
  color:var(--muted2);
}

/* quick chips */
.quick-list{display:flex;flex-direction:column;gap:5px}
.quick-chip{
  background:transparent;border:1px solid var(--border);
  border-radius:var(--rsm);padding:8px 11px;
  font-family:'IBM Plex Sans',sans-serif;font-size:.79rem;
  color:var(--muted);cursor:pointer;text-align:left;line-height:1.4;
  transition:background .15s,color .15s,border-color .15s;
}
.quick-chip:hover{background:var(--teal-dim);color:var(--teal);border-color:rgba(56,201,176,.3)}

/* divider */
.sb-divider{height:1px;background:var(--border);margin:0 -16px}

/* ── Chat Column ─────────────────────────────────────────────────────────── */
.chat-col{display:flex;flex-direction:column;overflow:hidden;background:var(--ink)}

/* messages */
.messages{
  flex:1;overflow-y:auto;
  padding:28px 36px 16px;
  display:flex;flex-direction:column;gap:22px;
}

/* row */
.row{display:flex;gap:11px;align-items:flex-end;animation:rise .22s ease}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.row.user{flex-direction:row-reverse}

.avatar{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1rem;
}
.row.bot  .avatar{background:var(--ink3);border:1px solid var(--border)}
.row.user .avatar{background:var(--gold)}

.msg-wrap{max-width:70%;display:flex;flex-direction:column;gap:5px}
.row.user .msg-wrap{align-items:flex-end}

/* bubble */
.bubble{
  padding:12px 15px;border-radius:14px;
  font-size:.9rem;line-height:1.68;word-break:break-word;
}
.row.bot  .bubble{background:var(--bot-bg);color:var(--cream);border:1px solid var(--border);border-bottom-left-radius:3px}
.row.user .bubble{background:var(--gold);color:var(--user-text);border-bottom-right-radius:3px;font-weight:500}

.ts{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--muted2)}

/* ── Bot answer extras ───────────────────────────────────────────────────── */
.ans-header{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.cat-tag{
  font-family:'IBM Plex Mono',monospace;font-size:.62rem;font-weight:500;
  padding:3px 8px;border-radius:20px;
  background:var(--gold-dim);color:var(--gold);letter-spacing:.06em;
}
.conf-wrap{display:flex;align-items:center;gap:7px;margin-bottom:2px}
.conf-bar{height:2px;width:80px;background:var(--border2);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));transition:width .5s ease}
.conf-pct{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--muted)}
.matched-q{font-size:.76rem;color:var(--muted);font-style:italic;margin-bottom:8px}

/* related */
.related-wrap{margin-top:10px}
.related-label{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--muted2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em}
.related-chips{display:flex;flex-wrap:wrap;gap:5px}
.rel-chip{
  background:transparent;border:1px solid var(--border);
  border-radius:20px;padding:4px 10px;
  font-size:.74rem;font-family:'IBM Plex Sans',sans-serif;
  color:var(--muted);cursor:pointer;
  transition:background .15s,color .15s,border-color .15s;
}
.rel-chip:hover{background:var(--teal-dim);color:var(--teal);border-color:rgba(56,201,176,.3)}

/* no-match */
.no-match-wrap .bubble{background:var(--ink3);border-color:var(--border2)}
.sugg-list{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.sugg-item{
  background:transparent;border:1px solid var(--border);border-radius:var(--rsm);
  padding:7px 10px;font-size:.79rem;font-family:'IBM Plex Sans',sans-serif;
  color:var(--muted);cursor:pointer;text-align:left;
  transition:background .15s,color .15s;
}
.sugg-item:hover{background:var(--gold-dim);color:var(--gold)}

/* ── Typing indicator ────────────────────────────────────────────────────── */
.typing-bubble{
  background:var(--bot-bg);border:1px solid var(--border);
  border-radius:14px;border-bottom-left-radius:3px;
  padding:13px 16px;display:flex;gap:5px;align-items:center;width:fit-content;
}
.td{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:td 1.2s ease-in-out infinite}
.td:nth-child(2){animation-delay:.2s}
.td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* ── Input bar ───────────────────────────────────────────────────────────── */
.input-bar{
  border-top:1px solid var(--border);
  padding:14px 28px;
  display:flex;gap:10px;align-items:flex-end;
  background:var(--ink2);flex-shrink:0;
}
.input-wrap{flex:1;position:relative}
textarea#userMsg{
  width:100%;
  background:var(--ink3);border:1.5px solid var(--border);
  border-radius:var(--r);color:var(--cream);
  font-family:'IBM Plex Sans',sans-serif;font-size:.9rem;
  padding:10px 14px;resize:none;outline:none;
  max-height:110px;overflow-y:auto;line-height:1.55;
  transition:border-color .2s;
}
textarea#userMsg:focus{border-color:var(--gold)}
textarea#userMsg::placeholder{color:var(--muted2)}
.char-hint{
  position:absolute;right:10px;bottom:8px;
  font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--muted2);
}
.send-btn{
  width:42px;height:42px;border-radius:var(--rsm);
  background:var(--gold);border:none;color:var(--user-text);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  transition:background .15s,transform .1s;
}
.send-btn:hover{background:#f5cd5a}
.send-btn:active{transform:scale(.94)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* ── Status bar ──────────────────────────────────────────────────────────── */
.status-bar{
  padding:4px 28px;font-family:'IBM Plex Mono',monospace;
  font-size:.62rem;color:var(--muted2);flex-shrink:0;
  border-top:1px solid var(--border);
  display:flex;justify-content:space-between;
}

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media(max-width:760px){
  .sidebar{display:none}
  .layout{grid-template-columns:1fr}
  .messages{padding:18px 16px 10px}
  .input-bar{padding:10px 14px}
  .status-bar{padding:4px 14px}
  .msg-wrap{max-width:88%}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hdr-left">
    <div class="logo-icon">🤖</div>
    <div>
      <div class="logo-text">AskBot</div>
      <div class="logo-tag">NLP · Cosine Similarity · NLTK</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="pulse"></div>
    Online · 20 FAQs indexed
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>
      <div class="sb-section-label">Browse Topics</div>
      <ul class="cat-list" id="catList">
        <li><button class="cat-btn active" data-cat="all">All Topics <span class="cat-count">20</span></button></li>
      </ul>
    </div>

    <div class="sb-divider"></div>

    <div>
      <div class="sb-section-label">Quick Questions</div>
      <div class="quick-list" id="quickList">
        <button class="quick-chip">How do I reset my password?</button>
        <button class="quick-chip">What payment methods do you accept?</button>
        <button class="quick-chip">How do I enable two-factor authentication?</button>
        <button class="quick-chip">Is there a mobile app?</button>
        <button class="quick-chip">How do I contact customer support?</button>
      </div>
    </div>
  </aside>

  <!-- CHAT COLUMN -->
  <div class="chat-col">
    <div class="messages" id="messages"></div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="userMsg" rows="1" maxlength="500"
          placeholder="Ask a question… (Enter to send, Shift+Enter for new line)"></textarea>
        <span class="char-hint" id="charHint">0 / 500</span>
      </div>
      <button class="send-btn" id="sendBtn" aria-label="Send message">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <div class="status-bar">
      <span id="statusLeft">Ready</span>
      <span>localhost:5001</span>
    </div>
  </div>

</div><!-- /layout -->

<script>
/* ── Config ─────────────────────────────────────────────────────────────── */
const API = "http://localhost:5001";

/* ── Elements ───────────────────────────────────────────────────────────── */
const msgBox    = document.getElementById("messages");
const input     = document.getElementById("userMsg");
const sendBtn   = document.getElementById("sendBtn");
const charHint  = document.getElementById("charHint");
const catList   = document.getElementById("catList");
const quickList = document.getElementById("quickList");
const statusLeft= document.getElementById("statusLeft");

/* ── Helpers ─────────────────────────────────────────────────────────────── */
const esc = s => {const d=document.createElement("div");d.appendChild(document.createTextNode(s));return d.innerHTML};
const now = () => new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const scrollEnd = () => { msgBox.scrollTop = msgBox.scrollHeight; };
const setStatus = t => { statusLeft.textContent = t; };

/* ── Append user bubble ──────────────────────────────────────────────────── */
function addUser(text) {
  const row = document.createElement("div");
  row.className = "row user";
  row.innerHTML = `
    <div class="msg-wrap">
      <div class="bubble">${esc(text)}</div>
      <div class="ts">${now()}</div>
    </div>
    <div class="avatar">🧑</div>`;
  msgBox.appendChild(row);
  scrollEnd();
}

/* ── Typing indicator ────────────────────────────────────────────────────── */
function showTyping() {
  const row = document.createElement("div");
  row.className = "row bot"; row.id = "typingRow";
  row.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="msg-wrap">
      <div class="typing-bubble">
        <div class="td"></div><div class="td"></div><div class="td"></div>
      </div>
    </div>`;
  msgBox.appendChild(row); scrollEnd();
}
function removeTyping() { document.getElementById("typingRow")?.remove(); }

/* ── Append bot answer ───────────────────────────────────────────────────── */
function addBot(data) {
  const row = document.createElement("div");
  row.className = "row bot";

  let inner = "";

  if (data.fetchError) {
    inner = `<div class="bubble" style="border-color:#f87171;color:#f87171;">
      ⚠️ ${esc(data.fetchError)}</div>`;

  } else if (!data.matched) {
    /* no match */
    let suggs = "";
    if (data.suggestions?.length) {
      suggs = `<div class="sugg-list">${
        data.suggestions.slice(0,4).map(q =>
          `<button class="sugg-item" onclick="ask(this.textContent)">${esc(q)}</button>`
        ).join("")
      }</div>`;
    }
    inner = `<div class="no-match-wrap">
      <div class="bubble">${esc(data.reply)}</div>
      ${suggs ? `<div class="related-label" style="margin-top:10px;font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;">Maybe you meant:</div>${suggs}` : ""}
    </div>`;

  } else {
    /* successful match */
    const pct = data.score_pct ?? Math.min(99, Math.round(data.score * 340));
    let related = "";
    if (data.related?.length) {
      related = `<div class="related-wrap">
        <div class="related-label">Related Questions</div>
        <div class="related-chips">${
          data.related.map(q =>
            `<button class="rel-chip" onclick="ask(this.textContent)">${esc(q)}</button>`
          ).join("")
        }</div>
      </div>`;
    }
    inner = `
      <div class="ans-header">
        <span class="cat-tag">${esc(data.category)}</span>
        <div class="conf-wrap">
          <div class="conf-bar"><div class="conf-fill" style="width:${pct}%"></div></div>
          <span class="conf-pct">${pct}% match</span>
        </div>
      </div>
      <div class="matched-q">Matched: "${esc(data.matched_question)}"</div>
      <div class="bubble">${esc(data.reply)}</div>
      ${related}`;
  }

  row.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="msg-wrap">${inner}<div class="ts">${now()}</div></div>`;
  msgBox.appendChild(row);
  scrollEnd();
}

/* ── Send message ────────────────────────────────────────────────────────── */
async function ask(text) {
  text = (text || "").trim();
  if (!text) return;
  addUser(text);
  input.value = ""; input.style.height="auto"; charHint.textContent="0 / 500";
  sendBtn.disabled = true;
  showTyping(); setStatus("AskBot is thinking…");

  try {
    const res  = await fetch(`${API}/chat`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({message: text})
    });
    const data = await res.json();
    removeTyping();
    if (!res.ok) {
      addBot({ fetchError: data.error || "Something went wrong. Please try again." });
    } else {
      addBot(data);
      setStatus(data.matched ? `Matched with ${(data.score*100).toFixed(0)}% confidence` : "No exact match found");
    }
  } catch {
    removeTyping();
    addBot({ fetchError: "Cannot reach the server. Make sure chatbot_app.py is running on port 5001." });
    setStatus("Connection error");
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

/* ── Input events ────────────────────────────────────────────────────────── */
sendBtn.addEventListener("click", () => ask(input.value));

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ask(input.value); }
});

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 110) + "px";
  charHint.textContent = `${input.value.length} / 500`;
});

/* ── Sidebar quick chips ─────────────────────────────────────────────────── */
quickList.querySelectorAll(".quick-chip").forEach(b =>
  b.addEventListener("click", () => ask(b.textContent))
);

/* ── Load categories from API ────────────────────────────────────────────── */
async function loadCats() {
  try {
    const [cRes, fRes] = await Promise.all([
      fetch(`${API}/categories`), fetch(`${API}/faqs`)
    ]);
    if (!cRes.ok || !fRes.ok) return;
    const cats  = await cRes.json();
    const faqs  = await fRes.json();

    /* build sidebar category buttons */
    cats.forEach(c => {
      const li = document.createElement("li");
      li.innerHTML = `<button class="cat-btn" data-cat="${esc(c.name)}">${esc(c.name)} <span class="cat-count">${c.count}</span></button>`;
      catList.appendChild(li);
    });

    catList.querySelectorAll(".cat-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        catList.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const cat = btn.dataset.cat;
        const filtered = cat === "all" ? faqs : faqs.filter(f => f.category === cat);
        quickList.innerHTML = "";
        filtered.slice(0,6).forEach(f => {
          const b = document.createElement("button");
          b.className = "quick-chip"; b.textContent = f.question;
          b.addEventListener("click", () => ask(f.question));
          quickList.appendChild(b);
        });
      });
    });
  } catch { /* sidebar is non-critical */ }
}

/* ── Welcome message ─────────────────────────────────────────────────────── */
function welcome() {
  const row = document.createElement("div");
  row.className = "row bot";
  row.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="msg-wrap">
      <div class="bubble">
        <strong>Hello! I'm AskBot.</strong><br><br>
        I use <em>NLP cosine similarity</em> to match your question with the most relevant answer from our knowledge base of <strong>20 FAQs</strong>.<br><br>
        Ask me about accounts, billing, security, privacy, and more — or pick a topic from the sidebar.
      </div>
      <div class="ts">${now()}</div>
    </div>`;
  msgBox.appendChild(row);
}

/* ── Init ─────────────────────────────────────────────────────────────────── */
welcome();
loadCats();
</script>
</body>
</html>
